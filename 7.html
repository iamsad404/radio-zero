<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Zero</title>
    <style>
        body {
            margin: 0;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88); z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1s ease; cursor: pointer;
        }
        #overlay.fade-out { opacity: 0; pointer-events: none; }
        .title-neon {
            color: #ff2d95;
            text-shadow: 0 0 10px #ff2d95, 0 0 40px #ff2d95, 0 0 80px #ff0066;
            font-size: 2.5rem; letter-spacing: 12px;
            animation: flicker 2s infinite alternate;
        }
        .status-text {
            color: #00e5ff;
            text-shadow: 0 0 10px #00e5ff, 0 0 30px #00e5ff;
            font-size: 0.9rem; letter-spacing: 4px;
            margin-top: 24px; min-height: 24px;
        }
        @keyframes flicker {
            0%{opacity:0.9} 50%{opacity:1;text-shadow:0 0 20px #ff2d95,0 0 60px #ff2d95,0 0 100px #ff0066} 100%{opacity:0.85}
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="overlay">
        <div class="title-neon">RADIO ZERO</div>
        <div class="status-text" id="statusText">[ CLICK TO TUNE IN ]</div>
    </div>

    <script>
        // 🎵 پلی‌لیست - لینک‌های آهنگ
        const playlist = [
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
        ];

        // 🎧 پلیر
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('statusText');
        let currentAudio = null;
        let isFirstClick = true;
        let playedTracks = [];

        function updateStatus(text) { statusText.textContent = text; }

        function playRandomTrack() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.src = '';
                currentAudio.load();
                currentAudio = null;
            }
            if (playedTracks.length >= playlist.length) playedTracks = [];
            let available = playlist.filter((_, i) => !playedTracks.includes(i));
            let url = available[Math.floor(Math.random() * available.length)];
            playedTracks.push(playlist.indexOf(url));

            currentAudio = new Audio();
            currentAudio.volume = 0.7;
            currentAudio.preload = 'auto';
            currentAudio.src = url;
            updateStatus('[ BUFFERING... ]');

            currentAudio.addEventListener('canplay', () => {
                updateStatus('[ STARTING... ]');
                overlay.classList.add('fade-out');
                currentAudio.play().then(() => updateStatus('')).catch(() => updateStatus('[ TAP TO RETRY ]'));
            });
            currentAudio.addEventListener('ended', () => { updateStatus('[ NEXT... ]'); playRandomTrack(); });
            currentAudio.addEventListener('error', () => { updateStatus('[ SKIPPING... ]'); setTimeout(() => playRandomTrack(), 1000); });
            currentAudio.load();
        }

        // 🎨 گرافیک
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, radius, angle = 0, time = 0, isActive = false, particles = [];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                let a = Math.random() * Math.PI * 2, r = radius + Math.random() * 30;
                this.x = cx + Math.cos(a) * r; this.y = cy + Math.sin(a) * r;
                this.size = Math.random() * 1.5 + 0.3; this.speed = Math.random() * 0.8 + 0.3;
                this.life = 1; this.decay = Math.random() * 0.008 + 0.004;
                this.hue = Math.random() < 0.5 ? 330 : 195;
            }
            update() {
                this.y -= this.speed; this.x += (Math.random() - 0.5) * 0.3;
                this.life -= this.decay; if (this.life <= 0) this.reset();
            }
            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue},100%,70%,${this.life*0.7})`;
                ctx.shadowBlur = 6; ctx.shadowColor = `hsla(${this.hue},100%,70%,${this.life*0.5})`;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        function resize() {
            W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight;
            cx = W / 2; cy = H / 2 + 10; radius = Math.min(W, H) * 0.32;
        }
        window.addEventListener('resize', resize); resize();
        for (let i = 0; i < 30; i++) particles.push(new Particle());

        function drawVinylGrooves(rot) {
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot);
            let hue = (time * 20 + 330) % 360;
            let g = ctx.createRadialGradient(0,0,radius*0.9,0,0,radius*1.05);
            g.addColorStop(0,'transparent'); g.addColorStop(1,`hsla(${hue},100%,50%,0.25)`);
            ctx.beginPath(); ctx.arc(0,0,radius*1.05,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
            g = ctx.createRadialGradient(0,0,radius*0.1,0,0,radius);
            g.addColorStop(0,'#0a0a0a'); g.addColorStop(0.6,'#111111'); g.addColorStop(0.9,'#0d0d0d'); g.addColorStop(1,'#080808');
            ctx.beginPath(); ctx.arc(0,0,radius,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
            for(let i=radius-3;i>55;i-=0.9){ctx.beginPath();ctx.arc(0,0,i,0,Math.PI*2);ctx.strokeStyle=`rgba(60,60,60,${0.08+Math.sin(i*2.5)*0.15+0.2})`;ctx.lineWidth=0.4;ctx.stroke();}
            for(let i=radius-3.5;i>55;i-=0.3){ctx.beginPath();ctx.arc(0,0,i,0,Math.PI*2);ctx.strokeStyle=`rgba(40,40,40,${0.03+Math.sin(i*7)*0.02})`;ctx.lineWidth=0.2;ctx.stroke();}
            g=ctx.createRadialGradient(0,0,radius*0.94,0,0,radius);
            g.addColorStop(0,'transparent');g.addColorStop(0.85,'transparent');g.addColorStop(1,`hsla(${hue},100%,60%,0.5)`);
            ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
            ctx.beginPath();ctx.arc(0,0,radius,0,Math.PI*2);ctx.strokeStyle=`hsla(${hue},100%,60%,0.8)`;ctx.lineWidth=2;ctx.shadowBlur=20;ctx.shadowColor=`hsla(${hue},100%,60%,1)`;ctx.stroke();ctx.shadowBlur=0;
            ctx.beginPath();ctx.arc(0,0,42,0,Math.PI*2);ctx.strokeStyle=`hsla(${(hue+30)%360},100%,60%,0.4)`;ctx.lineWidth=1;ctx.shadowBlur=8;ctx.shadowColor=`hsla(${(hue+30)%360},100%,60%,0.6)`;ctx.stroke();ctx.shadowBlur=0;
            g=ctx.createRadialGradient(0,0,5,0,0,40);g.addColorStop(0,'#1a1a2e');g.addColorStop(0.7,'#0d0d1a');g.addColorStop(1,'#080810');
            ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
            ctx.strokeStyle=`hsla(${hue},100%,50%,0.6)`;ctx.lineWidth=1;ctx.stroke();
            ctx.fillStyle='#fff';ctx.shadowBlur=10;ctx.shadowColor=`hsla(${hue},100%,70%,0.9)`;
            ctx.font='bold 9px "Courier New"';ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.fillText('RADIO',0,-6);ctx.font='bold 12px "Courier New"';ctx.fillText('ZERO',0,8);ctx.shadowBlur=0;
            ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
            ctx.strokeStyle=`hsla(${hue},100%,70%,0.8)`;ctx.lineWidth=1;ctx.shadowBlur=12;ctx.shadowColor=`hsla(${hue},100%,70%,1)`;ctx.stroke();ctx.shadowBlur=0;
            ctx.restore();
        }

        function drawRingLED(rot) {
            let hue=(time*20+330)%360,r=radius+8;
            ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=`hsla(${hue},100%,50%,0.4)`;ctx.lineWidth=1;ctx.shadowBlur=20;ctx.shadowColor=`hsla(${hue},100%,50%,0.8)`;ctx.stroke();ctx.shadowBlur=0;
            for(let i=0;i<20;i++){let a=rot*0.3+(i*Math.PI*2)/20,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r,b=0.4+Math.sin(time*3+i*0.7)*0.4;ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle=`hsla(${hue},100%,80%,${b})`;ctx.shadowBlur=8;ctx.shadowColor=`hsla(${hue},100%,80%,${b*0.8})`;ctx.fill();ctx.shadowBlur=0;}
        }

        function drawScanlines() { ctx.fillStyle='rgba(0,0,0,0.04)'; for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1); }

        function drawTitle() {
            let hue=(time*20+330)%360;ctx.fillStyle=`hsla(${hue},100%,70%,0.9)`;ctx.shadowBlur=20;ctx.shadowColor=`hsla(${hue},100%,70%,0.8)`;ctx.font='bold 22px "Courier New"';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('RADIO ZERO',cx,24);ctx.shadowBlur=0;
        }

        function animate(ts) {
            time=ts*0.001;ctx.clearRect(0,0,W,H);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
            drawScanlines();drawTitle();drawVinylGrooves(angle);drawRingLED(angle);
            if(isActive){particles.forEach(p=>{p.update();p.draw(ctx);});}
            angle+=0.02;requestAnimationFrame(animate);
        }

        overlay.addEventListener('click',()=>{isActive=true;if(isFirstClick){isFirstClick=false;playRandomTrack();}});
        overlay.addEventListener('touchstart',e=>{e.preventDefault();isActive=true;if(isFirstClick){isFirstClick=false;playRandomTrack();}});
        requestAnimationFrame(animate);
    </script>
</body>
</html>
